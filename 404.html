<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>광석이네 집 자료로 이동 중</title>
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var basePath = path.replace(/\/bbs\/board\.(php|html)$/i, "/");
      if (basePath === path) basePath = path.replace(/\/[^/]*$/i, "/");
      var target = new URL(basePath || "/", window.location.origin);
      target.search = window.location.search;
      target.hash = "";
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>광석이네 집 첫 화면으로 이동 중입니다.</p>
</body>
</html>
